<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Socket.IO Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }
        
        /* Боковая панель с пользователями */
        .users-sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .users-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .users-header h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .current-user {
            background: #e3f2fd;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #1976d2;
            font-weight: 500;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-item.active {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .user-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }
        
        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        
        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .chat-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.system {
            align-items: center;
        }
        
        .system-message {
            background: #fff3e0;
            color: #e65100;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message.own .message-content {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message.other .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.own {
            align-items: flex-end;
        }
        
        .message.other {
            align-items: flex-start;
        }
        
        .message-username {
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: 600;
            color: #666;
        }
        
        .message.own .message-username {
            color: #667eea;
        }
        
        .message-text {
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        
        .typing-indicator {
            padding: 10px 20px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
            font-style: italic;
            border-top: 1px solid #e0e0e0;
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .send-button:hover {
            background: #5a67d8;
        }
        
        /* Модальное окно для ввода имени */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .username-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        .join-button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .users-sidebar {
                display: none;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="users-sidebar">
            <div class="users-header">
                <h3>Участники чата</h3>
                <div class="current-user" id="currentUser">Вы: -</div>
            </div>
            <div class="users-list" id="usersList">
                <div class="user-item">Загрузка...</div>
            </div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <h2>💬 Общий чат</h2>
            </div>
            
            <div class="chat-messages" id="messages">
                <!-- Сообщения будут здесь -->
            </div>
            
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                Кто-то печатает...
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение..." disabled>
                <button class="send-button" id="sendButton" disabled>Отправить</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для ввода имени -->
    <div class="modal" id="usernameModal">
        <div class="modal-content">
            <h3>✨ Добро пожаловать в чат!</h3>
            <input type="text" class="username-input" id="usernameInput" placeholder="Введите ваше имя..." maxlength="30">
            <button class="join-button" id="joinButton">Присоединиться</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUsername = null;
        let typingTimeout = null;
        
        // DOM элементы
        const modal = document.getElementById('usernameModal');
        const usernameInput = document.getElementById('usernameInput');
        const joinButton = document.getElementById('joinButton');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const messagesContainer = document.getElementById('messages');
        const usersList = document.getElementById('usersList');
        const currentUserSpan = document.getElementById('currentUser');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Обработка присоединения к чату
        joinButton.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username && username.length >= 2) {
                currentUsername = username;
                socket.emit('set username', currentUsername);
                modal.style.display = 'none';
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
                currentUserSpan.textContent = `Вы: ${currentUsername}`;
            } else {
                alert('Пожалуйста, введите корректное имя (минимум 2 символа)');
            }
        });
        
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinButton.click();
            }
        });
        
        // Отправка сообщения
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message && currentUsername) {
                socket.emit('chat message', { message: message });
                messageInput.value = '';
                messageInput.focus();
                stopTyping();
            }
        }
        
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Обработка печати
        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim()) {
                socket.emit('typing start');
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    socket.emit('typing stop');
                }, 1000);
            } else {
                stopTyping();
            }
        });
        
        function stopTyping() {
            if (typingTimeout) {
                clearTimeout(typingTimeout);
                typingTimeout = null;
            }
            socket.emit('typing stop');
        }
        
        // Получение истории сообщений
        socket.on('chat history', (history) => {
            messagesContainer.innerHTML = '';
            history.forEach(message => {
                addMessageToChat(message);
            });
            scrollToBottom();
        });
        
        // Получение нового сообщения
        socket.on('chat message', (message) => {
            addMessageToChat(message);
            scrollToBottom();
        });
        
        // Добавление сообщения в чат
        function addMessageToChat(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.username === currentUsername ? 'own' : 'other'}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-username">${escapeHtml(message.username)}</div>
                    <div class="message-text">${escapeHtml(message.message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
        }
        
        // Добавление системного сообщения
        function addSystemMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.innerHTML = `
                <div class="system-message">
                    ${escapeHtml(text)}
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // Обработка подключения нового пользователя
        socket.on('user joined', (data) => {
            addSystemMessage(`${data.username} присоединился к чату`);
            updateUsersList(data.users);
        });
        
        // Обработка отключения пользователя
        socket.on('user left', (data) => {
            addSystemMessage(`${data.username} покинул чат`);
            updateUsersList(data.users);
        });
        
        // Обновление списка пользователей
        function updateUsersList(users) {
            if (users.length === 0) {
                usersList.innerHTML = '<div class="user-item">Нет активных пользователей</div>';
                return;
            }
            
            usersList.innerHTML = users.map(user => `
                <div class="user-item ${user === currentUsername ? 'active' : ''}">
                    <span class="user-status"></span>
                    <span>${escapeHtml(user)}${user === currentUsername ? ' (Вы)' : ''}</span>
                </div>
            `).join('');
        }
        
        // Обработка получения списка пользователей
        socket.on('users list', (users) => {
            updateUsersList(users);
        });
        
        // Обработка индикатора печати
        let typingTimeoutIndicator = null;
        socket.on('user typing', (data) => {
            if (data.username !== currentUsername) {
                if (data.isTyping) {
                    typingIndicator.textContent = `${escapeHtml(data.username)} печатает...`;
                    typingIndicator.style.display = 'block';
                    
                    if (typingTimeoutIndicator) clearTimeout(typingTimeoutIndicator);
                    typingTimeoutIndicator = setTimeout(() => {
                        typingIndicator.style.display = 'none';
                    }, 1500);
                } else {
                    typingIndicator.style.display = 'none';
                }
            }
        });
        
        // Вспомогательные функции
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
